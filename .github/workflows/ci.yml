name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Byte-compile
        run: python3 -m py_compile incident_triage.py

      - name: Version
        run: python3 incident_triage.py --version

      - name: Smoke test — JSON output is valid
        run: |
          python3 incident_triage.py \
            --sentinel-json tests/fixtures/sample-report.json \
            --alert tests/fixtures/sample-alert.json \
            | python3 -m json.tool > /dev/null

      - name: Smoke test — HTML renders
        run: |
          python3 incident_triage.py \
            --sentinel-json tests/fixtures/sample-report.json \
            --alert tests/fixtures/sample-alert.json \
            --output-format html > /tmp/triage.html
          grep -q "Incident Triage" /tmp/triage.html
          grep -q "Service restores to healthy state" /tmp/triage.html

      - name: Unit tests — correlation engine
        run: python3 -m unittest tests.test_correlation -v
